<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>かずをおぼえよう</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app" aria-labelledby="app-title">
      <header class="topbar">
        <h1 id="app-title">かずをおぼえよう</h1>
      </header>

      <section class="number-stage" aria-live="polite">
        <div id="digitCountControls" class="digit-count-host"></div>
        <div id="numberDisplay" class="number-display" aria-label="0">0</div>
        <div class="primary-controls">
          <button id="autoButton" class="control-button primary" type="button">
            <span
              class="control-button-icon control-button-icon-play"
              aria-hidden="true"
            ></span>
            <span>スタート</span>
          </button>
        </div>
      </section>

      <section class="controls" aria-label="操作">
        <section class="settings-panel" aria-label="設定">
          <div class="settings-top-row">
            <div class="setting-row">
              <span class="setting-label">よみあげ</span>
              <div class="speech-mode-options" role="radiogroup" aria-label="よみあげ">
                <label class="speech-mode-option">
                  <input
                    class="speech-mode-input"
                    type="radio"
                    name="speechMode"
                    value="off"
                    checked
                  />
                  <span class="speech-mode-option-label">OFF</span>
                </label>
                <label class="speech-mode-option">
                  <input
                    class="speech-mode-input"
                    type="radio"
                    name="speechMode"
                    value="on"
                  />
                  <span class="speech-mode-option-label">ON</span>
                </label>
              </div>
            </div>
            <div class="setting-row setting-row-rate">
              <span class="setting-label">はやさ</span>
              <div class="speech-rate-options" role="radiogroup" aria-label="はやさ">
                <label class="speech-rate-option">
                  <input
                    class="speech-rate-input"
                    type="radio"
                    name="speechRate"
                    value="0.8"
                    checked
                  />
                  <span class="speech-rate-option-label">とてもゆっくり</span>
                </label>
                <label class="speech-rate-option">
                  <input
                    class="speech-rate-input"
                    type="radio"
                    name="speechRate"
                    value="1.15"
                  />
                  <span class="speech-rate-option-label">ゆっくり</span>
                </label>
                <label class="speech-rate-option">
                  <input
                    class="speech-rate-input"
                    type="radio"
                    name="speechRate"
                    value="1.4"
                  />
                  <span class="speech-rate-option-label">はやい</span>
                </label>
                <label class="speech-rate-option">
                  <input
                    class="speech-rate-input"
                    type="radio"
                    name="speechRate"
                    value="1.75"
                  />
                  <span class="speech-rate-option-label">とてもはやい</span>
                </label>
              </div>
            </div>
          </div>
          <div class="settings-bottom-row">
            <div class="setting-row">
              <span class="setting-label">ことば</span>
              <div class="language-options" role="radiogroup" aria-label="ことば">
                <label class="language-option">
                  <input
                    class="language-input"
                    type="radio"
                    name="displayLanguage"
                    value="ja"
                    checked
                  />
                  <span class="language-option-label">にほんご</span>
                </label>
                <label class="language-option">
                  <input
                    class="language-input"
                    type="radio"
                    name="displayLanguage"
                    value="en"
                  />
                  <span class="language-option-label">English</span>
                </label>
              </div>
            </div>
            <div class="setting-row">
              <span class="setting-label">よみかた</span>
              <div class="reading-settings" role="group" aria-label="よみかた">
                <div class="reading-choice" role="radiogroup" aria-label="4のよみかた">
                  <label class="reading-choice-option">
                    <input
                      class="reading-choice-input"
                      type="radio"
                      name="readingChoice4"
                      data-reading-key="4"
                      value="0"
                      checked
                    />
                    <span class="reading-choice-option-label">よん</span>
                  </label>
                  <label class="reading-choice-option">
                    <input
                      class="reading-choice-input"
                      type="radio"
                      name="readingChoice4"
                      data-reading-key="4"
                      value="1"
                    />
                    <span class="reading-choice-option-label">し</span>
                  </label>
                </div>
                <div class="reading-choice" role="radiogroup" aria-label="7のよみかた">
                  <label class="reading-choice-option">
                    <input
                      class="reading-choice-input"
                      type="radio"
                      name="readingChoice7"
                      data-reading-key="7"
                      value="0"
                      checked
                    />
                    <span class="reading-choice-option-label">なな</span>
                  </label>
                  <label class="reading-choice-option">
                    <input
                      class="reading-choice-input"
                      type="radio"
                      name="readingChoice7"
                      data-reading-key="7"
                      value="1"
                    />
                    <span class="reading-choice-option-label">しち</span>
                  </label>
                </div>
                <div class="reading-choice" role="radiogroup" aria-label="9のよみかた">
                  <label class="reading-choice-option">
                    <input
                      class="reading-choice-input"
                      type="radio"
                      name="readingChoice9"
                      data-reading-key="9"
                      value="0"
                      checked
                    />
                    <span class="reading-choice-option-label">きゅう</span>
                  </label>
                  <label class="reading-choice-option">
                    <input
                      class="reading-choice-input"
                      type="radio"
                      name="readingChoice9"
                      data-reading-key="9"
                      value="1"
                    />
                    <span class="reading-choice-option-label">く</span>
                  </label>
                </div>
                <div class="reading-choice" role="radiogroup" aria-label="0のよみかた">
                  <label class="reading-choice-option">
                    <input
                      class="reading-choice-input"
                      type="radio"
                      name="readingChoice0"
                      data-reading-key="0"
                      value="0"
                      checked
                    />
                    <span class="reading-choice-option-label">ぜろ</span>
                  </label>
                  <label class="reading-choice-option">
                    <input
                      class="reading-choice-input"
                      type="radio"
                      name="readingChoice0"
                      data-reading-key="0"
                      value="1"
                    />
                    <span class="reading-choice-option-label">れい</span>
                  </label>
                </div>
              </div>
            </div>
          </div>
        </section>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
